name: CI-CD DevSecOps Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-scan-deploy:
    runs-on: ubuntu-latest

    steps:

    # 🔹 1. Checkout
    - name: Checkout code
      uses: actions/checkout@v3

    # 🔹 2. Docker Login
    - name: Docker Login
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # 🔹 3. Install Trivy
    - name: Install Trivy
      run: |
        sudo apt-get update
        sudo apt-get install -y wget apt-transport-https gnupg lsb-release
        wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
        echo deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main | sudo tee /etc/apt/sources.list.d/trivy.list
        sudo apt-get update
        sudo apt-get install -y trivy

    # 🔹 4. Build Docker Images
    - name: Build Docker Images
      run: |
        docker build -t posts-service ./services/posts
        docker build -t comments-service ./services/comments
        docker build -t query-service ./services/query
        docker build -t event-bus-service ./services/event-bus

    # 🔹 5. 🔐 Trivy Scan (FAIL on HIGH/CRITICAL)
    - name: Scan Images with Trivy (Fail on Vulnerabilities)
      run: |
        trivy image --exit-code 1 --severity HIGH,CRITICAL posts-service
        trivy image --exit-code 1 --severity HIGH,CRITICAL comments-service
        trivy image --exit-code 1 --severity HIGH,CRITICAL query-service
        trivy image --exit-code 1 --severity HIGH,CRITICAL event-bus-service

    # 🔹 6. Tag Images
    - name: Tag Images
      run: |
        docker tag posts-service ${{ secrets.DOCKER_USERNAME }}/posts-service
        docker tag comments-service ${{ secrets.DOCKER_USERNAME }}/comments-service
        docker tag query-service ${{ secrets.DOCKER_USERNAME }}/query-service
        docker tag event-bus-service ${{ secrets.DOCKER_USERNAME }}/event-bus-service

    # 🔹 7. Push Images
    - name: Push Images to Docker Hub
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/posts-service
        docker push ${{ secrets.DOCKER_USERNAME }}/comments-service
        docker push ${{ secrets.DOCKER_USERNAME }}/query-service
        docker push ${{ secrets.DOCKER_USERNAME }}/event-bus-service

    # 🔹 8. Deploy to EC2 (K8s)
    - name: Deploy to EC2 via SSH
      uses: appleboy/ssh-action@v0.1.10
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_KEY }}
        script: |
          cd ~/devsecops-project/k8s
          kubectl apply -f .
          kubectl rollout restart deployment posts
          kubectl rollout restart deployment comments
          kubectl rollout restart deployment query
          kubectl rollout restart deployment event-bus